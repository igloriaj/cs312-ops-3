---
- name: Deploy Containerized Minecraft Server
  hosts: all
  become: yes
  vars:
    ec2_registry_url: "339712850345.dkr.ecr.us-east-1.amazonaws.com/cs312-igloriaj-ops3"
    s3_bucket_name: "cs312-igloriaj-ops3-backups"
    image_tag: "v1.0.2"

  tasks:
    - name: Install Docker and aws cli
      apt:
        name:
          - docker.io
          - awscli
        state: present
        update_cache: yes
    
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Authenticate to ECR
      shell: |
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin {{ ecr_registry_url }}

    - name: Create data directory
      file:
        path: /home/ubuntu/minecraft_data
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0775'

    - name: Restore World from S3 if exists
      shell: "aws s3 cp s3://{{ s3_bucket }}/world_backup.tar.gz /tmp/world_backup.tar.gz || echo 'No backup found'"
      register: s3_download
      failed_when: "'Completed' not in s3_download.stderr and s3_download.rc != 0"
      ignore_errors: yes      

    - name: Check if backup was downloaded
      stat:
        path: /tmp/world_backup.tar.gz
      register: backup_file

    - name: Extract backup to /data
      unarchive:
        src: /tmp/world_backup.tar.gz
        dest: /home/ubuntu/minecraft_data
        remote_src: yes
      when: backup_file.stat.exists

    - name: Run Minecraft Container
      docker_container:
        name: minecraft-server
        image: "{{ ecr_registry_url }}:{{ image_tag }}"
        state: started
        restart_policy: always
        ports:
          - "25565:25565"
        volumes: 
          - /home/ubuntu/minecraft_data:/data
        env: 
          EULA: "TRUE"
          VERSION: "1.20.1"
          MEMORY: "1G"
          MOTD: "JP Igloria - CS312 Ops 3"
