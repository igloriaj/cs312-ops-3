---
- name: Deploy Containerized Minecraft Server
  hosts: all
  become: yes
  vars:
    ec2_registry_url: "339712850345.dkr.ecr.us-east-1.amazonaws.com/cs312-igloriaj-ops3"
    s3_bucket_name: "cs312-igloriaj-ops3-backups"
    image_tag: "v1.0.0"

  tasks:
    - name: Install Docker and aws cli
      apt:
        name:
          - docker
          - awscli
      state: present
    
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Authenticate to ECR
      shell: |
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin {{ ecr_registry_url }}

    - name: Create data directory
      file:
        path: /home/ec2-user/minecraft_data
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Restore World from S3 if exists
      shell: "aws s3 cp s3://{{ s3_bucket }}/world_backup.tar.gz /tmp/world.tar.gz || echo 'No backup found'"
      ignore_errors: yes      

    - name: Extract backup to /data
      unarchive:
        scr: /tmp/world.tar.gz
        dest: /home/ec2-user/minecraft_data
        remote_src: yes
      when: lookup('fileglob', '/tmp/world.tar.gz') != ""

    - name: Run Minecraft Container
      docker_container:
        name: minecraft-server
        image: "{{ ecr_registry_url }}:{{ image_tag }}"
        state: started
        restart_policy: always
        ports:
          - "25565:25565"
        volumes: 
          - /home/ec2-user/minecraft_data:/data
        env: 
        EULA: "TRUE"
        VERSION: "LATEST"
        TYPE: "PAPER"
        MEMORY: "512M"
        MOTD: "JP Igloria - CS312"
